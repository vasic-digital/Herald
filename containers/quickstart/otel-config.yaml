# otel-config.yaml — OpenTelemetry Collector config for the Herald V3
# §26.5 quickstart compose stack.
#
# Receives OTLP traffic from pherald (gRPC :4317 / HTTP :4318), enriches
# with deployment.environment=quickstart, then logs everything for
# operator inspection. Production deployments swap the `debug` exporter
# for OTLP fan-out into Tempo + Prometheus + Loki (see spec §17.1).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - key: deployment.environment
        value: quickstart
        action: upsert

exporters:
  # Quickstart: write to collector stdout so `podman logs herald-otel`
  # shows the trace/metric/log stream. Replace with otlp/* for prod.
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 100

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
  telemetry:
    logs:
      level: info
