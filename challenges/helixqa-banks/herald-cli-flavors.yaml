      - name: Run sherald version (human form)
        action: Execute ${HERALD_BIN_DIR}/sherald version
        expected: First stdout line starts with "System Herald"
    tags: [cli, sherald, version, json, smoke]
    estimated_duration: 5s
    documentation_refs:
      - type: source
        section: DefaultBranding-s
        path: commons/branding.go
    expected_result: sherald version --json reports binary sherald with full build info
