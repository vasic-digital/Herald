version: "1.0"
name: Herald CLI flavor binaries
description: >-
  Anti-bluff CLI test bank for Herald's eight flavor binaries
  (pherald / sherald / cherald / bherald / rherald / iherald / scherald /
  qaherald — see commons/branding.go DefaultBranding). Each case RUNS the
  REAL built binary end-to-end via a `shell:` action and asserts on its
  actual output: HelixQA's desktop challenge path executes every `shell:`
  step through `sh -c`, captures the real exit code + combined output as
  recorded evidence, and scores PASS only when the step exits 0. The shell
  command itself encodes the assertion (pipes the binary's stdout through
  `grep` so a wrong binary field / wrong flavor code / branding regression
  forces a NON-ZERO exit → FAIL). This makes a metadata-only / crash-absence
  PASS impossible: nothing scores PASS unless `<flavor>herald` actually
  emitted the correct bytes. Directly exercises the §107 "the binary really
  runs end-to-end for the end user" guarantee that Herald memory flags as a
  RECURRING defect class — unit tests call the cobra constructors and bypass
  main(), so eager-dependency and flag-ordering bugs hide there; these cases
  drive the compiled binary bare and with flags. scripts/helixqa_run.sh
  builds every flavor under ${HERALD_BIN_DIR} (exported into the run env, so
  `sh -c` expands it) before this bank runs.
metadata:
  author: vasic-digital
  app: Herald
  source: commons/branding.go + commons/cli/version.go
test_cases:
  - id: HRD-QA-CLI-001
    name: pherald version emits canonical JSON build info
    category: functional
    priority: critical
    platforms: [desktop]
    steps:
      - name: pherald version --json has binary=pherald, flavor=p, populated build info
        action: |-
          shell: out=$(${HERALD_BIN_DIR}/pherald version --json) && printf '%s' "$out" | grep -Eq '"binary"[[:space:]]*:[[:space:]]*"pherald"' && printf '%s' "$out" | grep -Eq '"flavor"[[:space:]]*:[[:space:]]*"p"' && printf '%s' "$out" | grep -Eq '"go_version"[[:space:]]*:[[:space:]]*"go[0-9]' && printf '%s' "$out" | grep -Eq '"os"[[:space:]]*:[[:space:]]*"[a-z]' && printf '%s' "$out" | grep -Eq '"arch"[[:space:]]*:[[:space:]]*"[a-z0-9]' && printf '%s' "$out" | grep -Eq '"version"[[:space:]]*:[[:space:]]*"[0-9]'
        expected: >-
          The shell action exits 0 only when `pherald version --json` emits
          JSON whose binary == "pherald", flavor == "p", and go_version / os /
          arch / version are populated (commons/cli VersionCmd canonical
          shape). A wrong binary/flavor field or missing key forces a non-zero
          grep exit → FAIL.
      - name: pherald version (human) first line is the Project Herald DisplayName
        action: |-
          shell: ${HERALD_BIN_DIR}/pherald version | head -1 | grep -Eq '^Project Herald '
        expected: >-
          Exit 0 only when the first stdout line of `pherald version` starts
          with "Project Herald " (the DefaultBranding DisplayName for the p
          flavor — guards the §3.5 branding table).
    tags: [cli, pherald, version, json, build-info, smoke]
    estimated_duration: 5s
    documentation_refs:
      - type: source
        section: VersionCmd
        path: commons/cli/version.go
      - type: source
        section: DefaultBranding-p
        path: commons/branding.go
    expected_result: pherald version --json reports binary pherald with full build info
