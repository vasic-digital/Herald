        action: |-
          shell: h=$(${HERALD_BIN_DIR}/pherald --help) && printf '%s' "$h" | grep -Eq '(^|[[:space:]])version([[:space:]]|$)' && printf '%s' "$h" | grep -Eq '(^|[[:space:]])serve([[:space:]]|$)' && printf '%s' "$h" | grep -Eq '(^|[[:space:]])listen([[:space:]]|$)' && printf '%s' "$h" | grep -Eq '(^|[[:space:]])watch([[:space:]]|$)'
        expected: >-
          Exit 0 only when `pherald --help` usage text names the version /
          serve / listen / watch subcommands (the §43 command-catalogue
          surface) so an operator can actually discover what the binary does.
    tags: [cli, pherald, help, usage, discoverability]
    estimated_duration: 5s
    documentation_refs:
      - type: spec
        section: "43"
        path: docs/specs/mvp/specification.V3.md
    expected_result: pherald --help prints discoverable usage with named subcommands
  - id: HRD-QA-CLI-010
    name: Unknown flavor subcommand fails loudly with non-zero exit
    category: functional
    priority: medium
    platforms: [desktop]
    steps:
      - name: pherald with a bogus subcommand exits non-zero
        action: |-
          shell: if ${HERALD_BIN_DIR}/pherald no-such-command >/dev/null 2>&1; then echo 'BUG: unknown subcommand exited 0'; exit 1; else exit 0; fi
        expected: >-
          The action exits 0 only when `pherald no-such-command` itself exits
          NON-zero (cobra unknown-command handling) — proving the binary does
          NOT silently succeed on an unknown verb. If the binary wrongly
          succeeded, the action prints "BUG:" and FAILs.
    tags: [cli, pherald, unknown-command, negative, fail-loud]
    estimated_duration: 5s
    expected_result: An unknown subcommand exits non-zero with a clear error
