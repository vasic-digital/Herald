  - id: HRD-QA-CLI-009
    name: pherald help lists its subcommands
    category: functional
    priority: high
    platforms: [desktop]
    steps:
      - name: Run pherald --help
        action: Execute ${HERALD_BIN_DIR}/pherald --help
        expected: >-
          Exit 0 and usage text on stdout that names the available subcommands
          (version, serve, listen — the §43 command catalogue surface) so an
          operator can actually discover what the binary does
    tags: [cli, pherald, help, usage, discoverability]
    estimated_duration: 5s
    documentation_refs:
      - type: spec
        section: "43"
        path: docs/specs/mvp/specification.V3.md
    expected_result: pherald --help prints discoverable usage with named subcommands
  - id: HRD-QA-CLI-010
    name: Unknown flavor subcommand fails loudly with non-zero exit
    category: functional
    priority: medium
    platforms: [desktop]
    steps:
      - name: Run pherald with a bogus subcommand
        action: Execute ${HERALD_BIN_DIR}/pherald no-such-command
        expected: >-
          Non-zero exit with an error message on stderr (cobra unknown-command
          handling) — the binary does NOT silently succeed on an unknown verb
    tags: [cli, pherald, unknown-command, negative, fail-loud]
    estimated_duration: 5s
    expected_result: An unknown subcommand exits non-zero with a clear error
