version: "1.0"
name: Herald CLI flavor binaries
description: >-
  Anti-bluff CLI test bank for Herald's eight flavor binaries
  (pherald / sherald / cherald / bherald / rherald / iherald / scherald /
  qaherald — see commons/branding.go DefaultBranding). Each case runs the
  REAL built binary end-to-end and asserts on its actual stdout: that
  `<flavor>herald version --json` emits canonical JSON whose binary field
  equals the flavor binary name, whose flavor / version / go_version / os /
  arch keys are populated (commons/cli VersionCmd), and that a
  representative subcommand (`version` human form, `--help`) prints its
  expected DisplayName / usage text. This directly exercises the §107
  "the binary actually runs end-to-end for the end user" guarantee that
  Herald's memory flags as a RECURRING defect class — unit tests call the
  cobra constructors and bypass main(), so eager-dependency and
  flag-ordering bugs hide there; these cases drive the compiled binary
  bare and with flags. scripts/helixqa_run.sh builds every flavor under
  ${HERALD_BIN_DIR} before this bank runs.
metadata:
  author: vasic-digital
  app: Herald
  source: commons/branding.go + commons/cli/version.go
test_cases:
  - id: HRD-QA-CLI-001
    name: pherald version emits canonical JSON build info
    category: functional
    priority: critical
    platforms: [desktop]
    steps:
      - name: Run pherald version --json
        action: Execute ${HERALD_BIN_DIR}/pherald version --json
        expected: >-
          Exit 0 and JSON on stdout where binary == "pherald", flavor is
          populated, version is a non-empty string, and go_version / os / arch
          are populated (commons/cli VersionCmd canonical shape)
      - name: Run pherald version (human form)
        action: Execute ${HERALD_BIN_DIR}/pherald version
        expected: >-
          Exit 0 and the first stdout line starts with "Project Herald"
          (the DefaultBranding DisplayName for the p flavor)
    tags: [cli, pherald, version, json, build-info, smoke]
    estimated_duration: 5s
    documentation_refs:
      - type: source
        section: VersionCmd
        path: commons/cli/version.go
      - type: source
        section: DefaultBranding-p
        path: commons/branding.go
    expected_result: pherald version --json reports binary pherald with full build info
  - id: HRD-QA-CLI-002
    name: sherald version emits canonical JSON build info
    category: functional
